version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: namememory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: namememory
      MYSQL_USER: namememory
      MYSQL_PASSWORD: namememory123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: namememory-backend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=namememory
      - MYSQL_USER=namememory
      - MYSQL_PASSWORD=namememory123
      - JWT_SECRET=local-development-secret-change-in-production
      - APP_URL=http://localhost:3000
      - API_URL=http://localhost:8080/api
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      mysql:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080/api
    container_name: namememory-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
